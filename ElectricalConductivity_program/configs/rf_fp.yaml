model:
  name: random_forest
  params:
    param_grid:
      n_estimators: [10, 50, 100, 200, 300]
      max_depth: [10, 20, 30, null]

data:
  feature_type: fingerprint
  target: sigma
  feature_path: ./data/processed/fingerprint/fp_sigma.csv
  data_path: ./data/raw/whole.csv

training:
  test_size: 0.2
  random_seed: 42
  grid_search: true

output:
  save_dir: ./results
  model_name: RF_fp_sigma
